<style>
    .back-top-btn {
        position: fixed;
        top: 16px;
        left: 16px;
        z-index: 1000;
        display: inline-flex;
        align-items: center;
        padding: 8px 12px;
        border-radius: 10px;
        border: 1px solid #cbd5e1;
        background: #ffffff;
        color: #1e293b;
        text-decoration: none;
        font-size: 14px;
        font-weight: 700;
        box-shadow: 0 8px 18px rgba(15, 23, 42, 0.12);
    }
</style>
<div class="detalle-usuario" th:fragment="contenido">
    <a class="back-top-btn" href="#" onclick="return window.dashboardBack ? window.dashboardBack('usuario') : false;">← Volver</a>
    <h2>Detalles del Usuario</h2>

    <table class="tabla-detalle-usuario">
        <thead>
            <tr>
                <th>Atributo</th>
                <th>Valor</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td class="negrita">ID</td>
                <td th:text="${user.nameUser}"></td>
            </tr>
            <tr>
                <td class="negrita">Nombre</td>
                <td th:text="${user.name}"></td>
            </tr>
            <tr>
                <td class="negrita">Apellido</td>
                <td th:text="${user.lastName}"></td>
            </tr>
            <tr>
                <td class="negrita">Cedula</td>
                <td th:text="${user.idCard}"></td>
            </tr>
            <tr>
                <td class="negrita">Correo</td>
                <td th:text="${user.mail}"></td>
            </tr>
            <tr>
                <td class="negrita">Teléfono</td>
                <td th:text="${user.phone}"></td>
            </tr>
            <tr>
                <td class="negrita">Edad</td>
                <td th:text="${user.age}"></td>
            </tr>
            <tr>
                <td class="negrita">Género</td>
                <td>
                    <span th:switch="${user.gender}">
                        <span th:case="'M'">Masculino</span>
                        <span th:case="'F'">Femenino</span>
                        <span th:case="*">Otro</span>
                    </span>
                </td>
            </tr>
            <tr>
                <td class="negrita">Rol</td>
                <td>
                    <span th:switch="${user.role}">
                        <span th:case="'A'">Administrador</span>
                        <span th:case="'S'">Supervisor</span>
                        <span th:case="'U'">Usuario</span>
                        <span th:case="*">Desconocido</span>
                    </span>
                </td>
            </tr>
        </tbody>
    </table>

    <button class="btn-delete btn-cerrar-detalles">Cerrar</button>

</div>
