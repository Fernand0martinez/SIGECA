<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <link rel="stylesheet" th:href="@{/css/styles.css}"/>
        <script type="text/javascript" th:src="@{/js/functionCourt.js}"></script>
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <title>Listado de Canchas - Cliente</title>
    </head>
    <body>
        <main class="main" th:fragment="main">
            <h1 class="main-title" th:text="${titulo}">Canchas Disponibles</h1>

            <!-- Mensajes -->
            <div id="container-messages" style="display:none;">
                <div th:if="${success}" class="success message" th:text="${success}"></div>
                <div th:if="${error}" class="error-message" th:text="${error}"></div>
            </div>

            <!-- Filtros -->
            <div class="filters-container">
                <form id="filter-form" th:action="@{/courts/client/filter}" class="filter-form">
                    <input type="text"
                           id="search_query"
                           name="query"
                           th:value="${param.query}"
                           class="filter-input"
                           placeholder="Buscar canchas...">
                    <button type="submit" class="button button--neutral">Filtrar</button>
                </form>
            </div>

            <!-- Tabla -->
            <div id="court-table-container">
                <div th:replace="~{court/court_table_client}"></div>
            </div>
        </main>
    </body>
</html>
