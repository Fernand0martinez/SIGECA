<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">     
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <title>Gestion Canchas - Administrador</title>
    </head>
    <body>   
        <main class="main" th:fragment="main">
            <h1 class="main-title" th:text="${titulo}">Gestión de Canchas (Administrador)</h1>

            <!-- Contenedor de mensajes (oculto para JS) -->
            <div id="container-messages" style="display: none;">
                <div th:if="${success}" class="success message" th:text="${success}"></div>
                <div th:if="${error}" class="error message" th:text="${error}"></div>
            </div>

            <!-- Contenedor de filtros -->
            <div class="filters-container">
                <button type="button" class="button button--primary" id="btn-new-court">Agregar</button>
                <form id="filter-form" th:action="@{/courts/admin/filter}" class="filter-form">
                    <input type="text" id="search_query" name="query" th:value="${param.query}"
                           class="form-input" placeholder="Buscar canchas...">
                    <button type="submit" class="button button--neutral">Filtrar</button>
                </form>
            </div>

            <!-- Formulario -->
            <div id="court-form-container"></div>

            <!-- Tabla de canchas -->
            <div id="court-table-container">
                <div th:replace="~{court/court_table_admin}"></div>
            </div>
        </main>
    </body>
</html>
