<!-- Contenedor de detalle -->
<style>
    .back-top-btn {
        position: fixed;
        top: 16px;
        left: 16px;
        z-index: 1000;
        display: inline-flex;
        align-items: center;
        padding: 8px 12px;
        border-radius: 10px;
        border: 1px solid #cbd5e1;
        background: #ffffff;
        color: #1e293b;
        text-decoration: none;
        font-size: 14px;
        font-weight: 700;
        box-shadow: 0 8px 18px rgba(15, 23, 42, 0.12);
    }

    .btn-volver {
        display: block;
        width: fit-content;
        margin: 12px auto 0;
        padding: 10px 20px;
        background-color: #dc3545;
        color: white;
        border: none;
        border-radius: 6px;
        text-decoration: none;
        font-weight: bold;
        cursor: pointer;
    }
</style>
<div id="detalle-patrocinio" th:fragment="contenido">
    <a class="back-top-btn" href="#" onclick="return window.dashboardBack ? window.dashboardBack('patrocinio') : false;">← Volver</a>

    <h2 style="text-align: center;">
        Detalles del Patrocinio "<span th:text="${patrocinio.company}"></span>"
    </h2>




    <table>
        <thead>
            <tr>
                <th>Detalles</th>
                <th>Valor</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Monto</td>
                <td th:text="${patrocinio.amount}"></td>
            </tr>
            <tr>
                <td>Inicio del Contrato</td>
                <td th:text="${patrocinio.contractStart}"></td>
            </tr>
            <tr>
                <td>Fin del Contrato</td>
                <td th:text="${patrocinio.contractEnd}"></td>
            </tr>
            <tr>
                <td>Activo</td>
                <td th:text="${patrocinio.isActive ? 'Sí' : 'No'}"></td>
            </tr>
            <tr>
                <td>Teléfono</td>
                <td th:text="${patrocinio.phoneNumber}"></td>
            </tr>
        </tbody>
    </table>

    <br>
    <button class="btn-volver" onclick="document.getElementById('detalle-patrocinio').innerHTML = ''">Volver</button>
</div>
