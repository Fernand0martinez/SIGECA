<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <link rel="stylesheet" th:href="@{/css/back-button.css}">
    </head>
    <body>
        <div th:fragment="formularioProducto">
            <a class="back-top-btn" href="#" onclick="if (typeof cerrarFormularioProducto === 'function') { cerrarFormularioProducto(); return false; } return window.dashboardBack ? window.dashboardBack('producto', 'productos') : false;">Volver</a>
            <form id="form-producto" class="formulario-producto" th:action="@{/products/admin/save}" method="post">
                <h2 th:text="${modo == 'editar' ? 'Editar Producto' : 'Registrar Producto'}">Formulario Producto</h2>

                <input type="hidden" name="idProduct"
                       th:if="${producto != null}" th:value="${producto.idProduct}">

                <label for="productName">Nombre:</label>
                <input type="text" id="productName" name="productName" required
                       th:value="${producto.productName}">

                <label for="description">Descripcion:</label>
                <textarea id="description" name="description"
                          th:text="${producto.description}"></textarea>

                <label for="category">Categoria:</label>
                <select id="category" name="category" required>
                    <option value="">Seleccione una categoria</option>
                    <option value="Pelotas" th:selected="${producto.category == 'Pelotas'}">Pelotas</option>
                    <option value="Botellas" th:selected="${producto.category == 'Botellas'}">Botellas</option>
                    <option value="Ropa" th:selected="${producto.category == 'Ropa'}">Ropa</option>
                    <option value="Suplementos" th:selected="${producto.category == 'Suplementos'}">Suplementos</option>
                    <option value="Calzado" th:selected="${producto.category == 'Calzado'}">Calzado</option>
                </select>

                <label for="price">Precio:</label>
                <input type="number" id="price" name="price" step="0.01" min="0" required
                       th:value="${producto.price}">

                <label for="stock">Stock:</label>
                <input type="number" id="stock" name="stock" min="0" required
                       th:value="${producto.stock}">

                <label for="court">Cancha:</label>
                <select id="court" name="court.idCourt" required>
                    <option th:each="cancha : ${canchas}"
                            th:value="${cancha.idCourt}"
                            th:selected="${producto != null and producto.court != null and producto.court.idCourt == cancha.idCourt}"
                            th:text="${cancha.nameCourt}">Cancha</option>
                </select>

                <div style="margin-top: 10px;">
                    <button type="submit" th:text="${modo == 'editar' ? 'Actualizar' : 'Registrar'}">Enviar</button>
                    <button type="button" id="cancelar-formulario-producto">Cancelar</button>
                </div>
            </form>
        </div>
    </body>
</html>
