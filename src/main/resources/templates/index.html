<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar a la Cancha | SIGECA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/login-sports.css}">
</head>
<body class="login-page">
    <main class="login-shell">
        <section class="login-panel">
            <div class="login-badge">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z"/></svg>
                SIGECA SPORT
            </div>
            <h1>¡Al Terreno!</h1>
            <p class="login-subtitle">Inicia sesión para gestionar tus canchas y partidos.</p>

            <form class="login-form" th:action="@{/login/authenticate}" method="POST">
                <div class="form-group">
                    <label for="username">Usuario del Equipo</label>
                    <div class="input-wrapper">
                        <input type="text" id="username" name="username" placeholder="Tu apodo o usuario" required>
                    </div>
                    <span class="field-info">Ingresa el nombre de usuario registrado.</span>
                </div>

                <div class="form-group">
                    <label for="password">Tu Clave Táctica</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" name="password" placeholder="••••••••" required>
                        <button type="button" class="password-toggle" id="togglePass" data-tooltip="Mostrar/Ocultar contraseña">
                            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                        </button>
                    </div>
                    <span class="field-info">Mínimo 6 caracteres de seguridad.</span>
                </div>

                <div th:if="${error}" class="error-message">
                    <strong>¡Falta!</strong> <span th:text="${mensaje}">Credenciales inválidas</span>
                </div>

                <button type="submit" class="btn-submit" data-tooltip="¡Haz clic para entrar a gestionar!">
                    INICIAR SESIÓN
                </button>
            </form>

            <div class="footer-links">
                <a th:href="@{/login/form}" class="register-link" data-tooltip="¿Aún no eres parte del club?">
                    ¿No tienes cuenta? Regístrate aquí
                </a>
            </div>
        </section>
    </main>

    <script>
        document.getElementById('togglePass').addEventListener('click', function() {
            const passInput = document.getElementById('password');
            const type = passInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passInput.setAttribute('type', type);
        });
    </script>
</body>
</html>
