<html xmlns:th="http://www.thymeleaf.org" lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Lista de Torneos</title>
        <link rel="stylesheet" th:href="@{/css/tournament.css}">
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    </head>
    <body>
        <div class="tournament-container" th:fragment="contenido">
            <h2>Inscripción a Torneos</h2>

            <!-- Mensajes de alerta -->
            <div th:if="${error}" class="alert alert-danger" style="color: red;" role="alert" th:text="${error}"></div>
            <div th:if="${success}" class="alert alert-success" style="color: green;" role="alert" th:text="${success}"></div>

            <div class="main-content">
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Nombre</th>
                                <th>Acción</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="tournament : ${tournaments}">
                                <td th:text="${tournament.name}">Nombre Torneo</td>
                                <td>
                                    <form th:action="@{/tournaments/user/register}" method="POST">
                                        <input type="hidden" name="tournamentId" th:value="${tournament.id}">
                                        <select name="teamId" required>
                                            <option value="">Seleccione equipo</option>
                                            <option th:each="team : ${userTeams}" th:value="${team.id}" th:text="${team.name}"></option>
                                        </select>
                                        <button type="submit" class="action-btn">Inscribirse</button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </body>
</html>
