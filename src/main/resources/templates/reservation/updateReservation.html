<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Editar Reservacion | SIGECA</title>
        <link rel="stylesheet" th:href="@{/css/reservation-form.css}">
        <link rel="stylesheet" th:href="@{/css/back-button.css}">
    </head>
    <body class="reservation-page">
        <div class="reservation-shell" th:fragment="contenido">
            <a class="back-top-btn" href="#" onclick="return window.dashboardBack ? window.dashboardBack('reservaciones') : false;">Volver</a>
            <div class="reservation-card">
                <div class="reservation-card-header">
                    <h1>Editar reservacion</h1>
                    <p>Actualice la fecha, el horario o la cancha de su reservacion.</p>
                </div>

                <div class="reservation-card-body">
                    <p class="reservation-user">Usuario actual: <span th:text="${usuario.nameUser}">Nombre de usuario</span></p>

                    <form method="post" action="/reservations/user/update" class="reservation-form">
                        <input type="hidden" name="id" th:value="${reservacion.id}" required>

                        <div class="reservation-field">
                            <label for="date">Fecha</label>
                            <input type="date" id="date" name="date" th:value="${reservacion.date}" required>
                        </div>

                        <div class="reservation-field">
                            <label for="courtId">Cancha</label>
                            <select id="courtId" name="courtId" required>
                                <option value="" disabled>Seleccione una cancha</option>
                                <option th:each="c : ${courts}" th:value="${c.idCourt}" th:text="${c.nameCourt}" th:selected="${c.idCourt == reservacion.court.idCourt}"></option>
                            </select>
                        </div>

                        <div class="reservation-field">
                            <label for="startHour">Hora de inicio</label>
                            <input type="number" id="startHour" name="startHour" min="6" max="22" th:value="${reservacion.startHour}" required>
                        </div>

                        <div class="reservation-field">
                            <label for="endHour">Hora de fin</label>
                            <input type="number" id="endHour" name="endHour" min="6" max="22" th:value="${reservacion.endHour}" required>
                        </div>

                        <div class="reservation-actions">
                            <div class="reservation-action-group">
                                <button class="reservation-btn reservation-btn-danger" type="button" onclick="return window.dashboardBack ? window.dashboardBack('reservaciones') : false;">Volver</button>
                            </div>
                            <button type="submit" class="reservation-btn reservation-btn-primary">Guardar cambios</button>
                        </div>
                    </form>
                </div>
            </div>

            <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
            <script th:if="${mensaje != null}">
                Swal.fire(
                    '[[${tipo}]]',
                    '[[${mensaje}]]',
                    '[[${tipo}]]'
                );
            </script>
        </div>
    </body>
</html>
